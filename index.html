<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodatx — Brand Identity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Thmanyah';
      src: url('fonts/thmanyah/thmanyahsans-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Thmanyah';
      src: url('fonts/thmanyah/thmanyahsans-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bento">

    <!-- ══════ ROW 1 ══════ -->

    <!-- Primary -->
    <div class="card color-card" data-pos="r1c1">
      <div class="color-header">
        <span class="color-name">Primary</span>
        <span class="color-hex">#9744DB</span>
      </div>
      <div class="color-strip">
        <span style="background:#2d004f"></span><span style="background:#4b007d"></span>
        <span style="background:#6b00af"></span><span style="background:#852fc9"></span>
        <span style="background:#9744db"></span><span style="background:#b06be3"></span>
        <span style="background:#c5a9ff"></span><span style="background:#e0b7ff"></span>
        <span style="background:#f2daff"></span><span style="background:#fcefff"></span>
      </div>
    </div>

    <!-- English -->
    <div class="card typo-card" data-pos="r1c2">
      <div class="typo-meta">
        <span>English</span>
        <div class="typo-right">
          <span class="typo-font">Poppins</span>
          <a href="https://fonts.google.com/specimen/Poppins" target="_blank" class="download-link" title="Download Poppins">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
          </a>
        </div>
      </div>
      <div class="typo-giant">Nodatx</div>
    </div>

    <!-- Buttons -->
    <div class="card buttons-card" data-pos="r1c3">
      <div class="btn-row">
        <button class="bbtn bbtn-primary">Primary</button>
        <button class="bbtn bbtn-secondary">Secondary</button>
      </div>
      <div class="btn-row">
        <button class="bbtn bbtn-inverted">Inverted</button>
        <button class="bbtn bbtn-outlined">Outlined</button>
      </div>
    </div>

    <!-- Search -->
    <div class="card search-card" data-pos="r1c4">
      <div class="search-input">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span>Search</span>
      </div>
    </div>

    <!-- ══════ ROW 2 ══════ -->

    <!-- Secondary -->
    <div class="card color-card" data-pos="r2c1">
      <div class="color-header">
        <span class="color-name">Secondary</span>
        <span class="color-hex">#C5A9FF</span>
      </div>
      <div class="color-strip">
        <span style="background:#240257"></span><span style="background:#3a1f6d"></span>
        <span style="background:#513885"></span><span style="background:#533a87"></span>
        <span style="background:#7b5cb5"></span><span style="background:#9b82d0"></span>
        <span style="background:#c5a9ff"></span><span style="background:#d2bbff"></span>
        <span style="background:#eaddff"></span><span style="background:#f5eeff"></span>
      </div>
    </div>

    <!-- Arabic -->
    <div class="card typo-card typo-ar" data-pos="r2c2">
      <div class="typo-meta">
        <span dir="rtl">عربي</span>
        <div class="typo-right">
          <span class="typo-font">Thmanyah</span>
          <a href="fonts/thmanyah/thmanyahsans-Regular.woff2" download class="download-link" title="Download Thmanyah">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
          </a>
        </div>
      </div>
      <div class="typo-giant" dir="rtl" lang="ar">نوداتكس</div>
    </div>

    <!-- Text Lines -->
    <div class="card lines-card" data-pos="r2c3">
      <div class="text-line w80"></div>
      <div class="text-line w60"></div>
      <div class="text-line w90"></div>
    </div>

    <!-- Nav Icons -->
    <div class="card nav-icons-card" data-pos="r2c4">
      <div class="nav-icons">
        <div class="nav-icon active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        <div class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </div>
        <div class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>
    </div>

    <!-- ══════ ROW 3 ══════ -->

    <!-- Tertiary -->
    <div class="card color-card" data-pos="r3c1">
      <div class="color-header">
        <span class="color-name">Tertiary</span>
        <span class="color-hex">#55009B</span>
      </div>
      <div class="color-strip">
        <span style="background:#1a0030"></span><span style="background:#2b0053"></span>
        <span style="background:#3d0074"></span><span style="background:#470083"></span>
        <span style="background:#55009b"></span><span style="background:#6e2ab5"></span>
        <span style="background:#8d4ed3"></span><span style="background:#a970e0"></span>
        <span style="background:#c9a0f0"></span><span style="background:#fbefff"></span>
      </div>
    </div>

    <!-- Pen + Label -->
    <div class="card icon-label-card" data-pos="r3c2">
      <div class="il-row">
        <div class="icon-btn-sq">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
        </div>
        <span class="label-chip">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
          Label
        </span>
      </div>
    </div>

    <!-- Icon Buttons -->
    <div class="card icon-buttons-card" data-pos="r3c3">
      <div class="icon-btns-row">
        <div class="icon-btn purple">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
        </div>
        <div class="icon-btn purple">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </div>
        <div class="icon-btn purple">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></svg>
        </div>
        <div class="icon-btn orange">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
        </div>
      </div>
    </div>

    <!-- ══════ ROW 4 ══════ -->

    <!-- Neutral -->
    <div class="card color-card" data-pos="r4c1">
      <div class="color-header">
        <span class="color-name">Neutral</span>
        <span class="color-hex">#0F0F12</span>
      </div>
      <div class="color-strip">
        <span style="background:#08080a"></span><span style="background:#0e0e11"></span>
        <span style="background:#131316"></span><span style="background:#1b1b1e"></span>
        <span style="background:#1f1f22"></span><span style="background:#2a2a2d"></span>
        <span style="background:#353438"></span><span style="background:#4d4353"></span>
        <span style="background:#998c9f"></span><span style="background:#e4e1e6"></span>
      </div>
    </div>

    <!-- Square Logo White -->
    <div class="card logo-card" data-pos="r4c2">
      <div class="logo-header">
        <span class="logo-label">Logo — White</span>
        <a href="white nodatx.png" download class="download-link" title="Download">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        </a>
      </div>
      <div class="logo-preview dark">
        <img src="white nodatx.png" alt="Nodatx white logo">
      </div>
    </div>

    <!-- Square Logo Black -->
    <div class="card logo-card" data-pos="r4c3">
      <div class="logo-header">
        <span class="logo-label">Logo — Black</span>
        <a href="black nodatx.png" download class="download-link" title="Download">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        </a>
      </div>
      <div class="logo-preview light">
        <img src="black nodatx.png" alt="Nodatx black logo">
      </div>
    </div>

    <!-- ══════ ROW 5: Long Logos ══════ -->

    <!-- Long White -->
    <div class="card logo-card logo-wide" data-pos="r5c1">
      <div class="logo-header">
        <span class="logo-label">Logo Long — White</span>
        <a href="long white.png" download class="download-link" title="Download">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        </a>
      </div>
      <div class="logo-preview dark">
        <img src="long white.png" alt="Nodatx long white logo">
      </div>
    </div>

    <!-- Long Black -->
    <div class="card logo-card logo-wide" data-pos="r5c2">
      <div class="logo-header">
        <span class="logo-label">Logo Long — Black</span>
        <a href="long black.png" download class="download-link" title="Download">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        </a>
      </div>
      <div class="logo-preview light">
        <img src="long black.png" alt="Nodatx long black logo">
      </div>
    </div>

  </div>

</body>
</html>
